# ==========================================
# CYBER LOOK 
# SYSTEM LOCK SCREEN LAYER
# ==========================================


# ==========================================
# GENERAL BEHAVIOR (SYSTEM STATE CONTROL)
# ==========================================

general {
    hide_cursor = true
    grace = 0
}


# ==========================================
# BACKGROUND LAYER (SECURE VISUAL FIELD)
# ==========================================

background {
    path = ~/pictures/wallpapers/14. Sci-fi.jpg

    blur_passes = 3
    blur_size = 8

    brightness = 0.7
    contrast = 1.1
}


# ==========================================
# SYSTEM STATUS LABEL (IDENTITY NODE)
# ==========================================

label {
    text =   GENTOO AUTHENTICATION NODE
    font_size = 14
    font_family = JetBrainsMono Nerd Font

    position = 0, -140
    halign = center

    color = rgba(79, 214, 190, 0.9)
}


# ==========================================
# TIME NODE (PRIMARY SYSTEM CLOCK - 12H FORMAT)
# BECAUSE I HATE THE 24 HOUR FORMAT 
# ==========================================

label {
    text = cmd[update:1000] echo "$(date +'%I:%M %p')"
    font_size = 72
    font_family = JetBrainsMono Nerd Font

    position = 0, 120
    halign = center

    color = rgba(205, 214, 244, 0.95)
}


# ==========================================
# DATE NODE (SECONDARY CONTEXT LAYER)
# ==========================================

label {
    text = cmd[update:1000] echo "$(date +'%A, %d %B %Y')"
    font_size = 18

    position = 0, 40
    halign = center

    color = rgba(166, 173, 200, 0.8)
}


# ==========================================
# PASSWORD INPUT (SECURE COMMAND FIELD)
# ==========================================

input-field {
    size = 320, 50

    position = 0, -40
    halign = center

    outer_color = rgba(49, 50, 68, 0.6)
    inner_color = rgba(24, 24, 37, 0.85)

    font_color = rgba(205, 214, 244, 1.0)

    check_color = rgba(79, 214, 190, 0.9)
    fail_color = rgba(243, 139, 168, 0.9)

    outline_thickness = 2
    rounding = 12

    dots_spacing = 0.3
    dots_center = true
    fade_on_empty = false
}
